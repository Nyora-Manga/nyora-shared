name: CI

# Build verification on every push/PR to main: compiles the JVM sources and the
# deployable helper jar so a broken build never reaches the `deploy` branch.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6
      - name: Compile JVM sources
        run: ./gradlew compileKotlinJvm --no-daemon --console=plain
      - name: Build helper jar
        run: ./gradlew helperJar --no-daemon --console=plain
      - uses: actions/upload-artifact@v7
        with:
          name: nyora-helper-jar
          path: build/libs/nyora-helper.jar
          retention-days: 3
